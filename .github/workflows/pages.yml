name: Deploy GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: true

      - name: Ensure Git LFS files are present
        run: |
          git lfs version
          git lfs pull
          git lfs checkout

      - name: Verify no LFS pointer files in Build
        run: |
          if grep -R "git-lfs.github.com/spec/v1" -n Build; then
            echo "ERROR: LFS pointer files detected in Build/"
            exit 1
          fi

      # Optional but very useful debug: adjust filename to your actual file
      - name: Debug one Build file (size + first line)
        run: |
          ls -lh Build | head -n 50
          echo "---- first line ----"
          head -n 1 Build/*.framework.js.br || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Disable Jekyll
        run: touch .nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4